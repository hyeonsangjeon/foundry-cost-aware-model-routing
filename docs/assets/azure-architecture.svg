<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Azure AI Foundry Model Router architecture with keyless Entra auth: your app calls one model-router deployment, which routes each prompt to a backend from its own managed roster such as gpt-5.4 or grok-4-1-fast-reasoning and returns the served model as ground truth">
  <rect x="0" y="0" width="800" height="470" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#1f2933">Azure AI Foundry Model Router — the real (measured) path</text>
  <text x="24" y="50" font-size="12.5" fill="#52606d">You call <tspan font-family="monospace" font-weight="700">model=&quot;model-router&quot;</tspan> once; the router picks a backend and returns it in <tspan font-family="monospace" font-weight="700">response.model</tspan>.</text>

  <defs>
    <marker id="aA" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7b8794"/></marker>
    <marker id="aB" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2e8b57"/></marker>
  </defs>

  <!-- APP -->
  <rect x="20" y="150" width="158" height="94" rx="9" fill="#eef2f7" stroke="#cbd2d9"/>
  <text x="99" y="176" font-size="13" font-weight="700" fill="#1f2933" text-anchor="middle">your app / CLI</text>
  <rect x="34" y="188" width="130" height="42" rx="5" fill="#1f2933"/>
  <text x="99" y="205" font-size="10.5" font-family="monospace" fill="#e6f4ec" text-anchor="middle">chat.completions</text>
  <text x="99" y="220" font-size="10.5" font-family="monospace" fill="#8fd6ac" text-anchor="middle">model=&quot;model-router&quot;</text>
  <!-- Entra badge -->
  <rect x="20" y="256" width="158" height="66" rx="9" fill="#eef4fb" stroke="#bcd4f0"/>
  <text x="99" y="278" font-size="11.5" font-weight="700" fill="#1c4f8a" text-anchor="middle">DefaultAzureCredential</text>
  <text x="99" y="295" font-size="10.5" fill="#2f6bc0" text-anchor="middle">Microsoft Entra · keyless</text>
  <text x="99" y="311" font-size="10.5" fill="#c0392b" text-anchor="middle">no API key stored</text>

  <!-- app -> foundry -->
  <line x1="178" y1="188" x2="246" y2="188" stroke="#7b8794" stroke-width="1.8" marker-end="url(#aA)"/>
  <text x="212" y="180" font-size="9.5" fill="#7b8794" text-anchor="middle">Bearer</text>
  <text x="212" y="203" font-size="8.5" fill="#9aa5b1" text-anchor="middle">…/.default</text>

  <!-- FOUNDRY resource -->
  <rect x="250" y="112" width="244" height="222" rx="11" fill="#f5f8fc" stroke="#3b7dd8" stroke-width="1.5"/>
  <text x="372" y="136" font-size="12.5" font-weight="700" fill="#2f6bc0" text-anchor="middle">Azure AI Foundry (AIServices)</text>
  <text x="372" y="152" font-size="10" fill="#7b8794" text-anchor="middle">aoai-router5-… · custom domain</text>
  <!-- model-router deployment -->
  <rect x="270" y="166" width="204" height="70" rx="8" fill="#2e8b57"/>
  <text x="372" y="192" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">model-router</text>
  <text x="372" y="209" font-size="10" fill="#e6f4ec" text-anchor="middle">deployment · 2025-11-18</text>
  <text x="372" y="224" font-size="10" fill="#e6f4ec" text-anchor="middle">GlobalStandard · one call in</text>
  <!-- notes -->
  <text x="372" y="258" font-size="10.5" fill="#52606d" text-anchor="middle">RBAC: Cognitive Services OpenAI User</text>
  <text x="372" y="274" font-size="10.5" fill="#52606d" text-anchor="middle" font-family="monospace">disableLocalAuth = true</text>
  <text x="372" y="290" font-size="10.5" fill="#52606d" text-anchor="middle">→ Entra tokens only, no keys</text>
  <text x="372" y="316" font-size="10" fill="#9aa5b1" text-anchor="middle">picks 1 from its own roster →</text>

  <!-- foundry -> backends -->
  <line x1="494" y1="200" x2="566" y2="200" stroke="#7b8794" stroke-width="1.8" marker-end="url(#aA)"/>

  <!-- BACKENDS: the Model Router's own managed roster (chosen internally) -->
  <rect x="562" y="90" width="220" height="156" rx="10" fill="#f7f8fa" stroke="#cbd2d9"/>
  <text x="672" y="108" font-size="10.5" font-weight="700" fill="#52606d" text-anchor="middle">Model Router roster — internal</text>
  <!-- selection ring (alternates gpt-5.4 / grok — the two that served the measured run) -->
  <rect x="567" y="115" width="210" height="44" rx="8" fill="none" stroke="#1f2933" stroke-width="3">
    <animate attributeName="y" dur="4s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.5;1" values="115;163;115"/>
  </rect>
  <!-- gpt-5.4 -->
  <rect x="572" y="119" width="200" height="40" rx="7" fill="#3b7dd8"/>
  <text x="584" y="136" font-size="12" font-weight="700" fill="#ffffff">gpt-5.4</text>
  <text x="764" y="136" font-size="9.5" fill="#e3ecfa" text-anchor="end">served ×3</text>
  <text x="584" y="151" font-size="9" font-family="monospace" fill="#e3ecfa">id: chatcmpl-…</text>
  <!-- grok -->
  <rect x="572" y="167" width="200" height="40" rx="7" fill="#7b52c9"/>
  <text x="584" y="184" font-size="11.5" font-weight="700" fill="#ffffff">grok-4-1-fast-reasoning</text>
  <text x="764" y="184" font-size="9.5" fill="#efe9fa" text-anchor="end">served ×2</text>
  <text x="584" y="199" font-size="9" font-family="monospace" fill="#efe9fa">id: 8-4-4-4-12 UUID</text>
  <!-- more -->
  <text x="672" y="230" font-size="9.5" fill="#9aa5b1" text-anchor="middle">+ more models per router version</text>

  <!-- return path: backend -> app (response.model = ground truth), routed around the left margin -->
  <path d="M672,246 L672,410 L8,410 L8,197 L16,197" fill="none" stroke="#2e8b57" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#aB)"/>
  <rect x="250" y="352" width="300" height="26" rx="8" fill="#eef7f1" stroke="#bfe0cd"/>
  <text x="286" y="369" font-size="11" fill="#1f6b42"><tspan font-weight="700">response.model</tspan> = the real backend (ground truth)</text>

  <!-- honesty badges -->
  <rect x="20" y="432" width="470" height="30" rx="8" fill="#e6f4ec" stroke="#bfe0cd"/>
  <text x="34" y="451" font-size="10.5" fill="#1f6b42"><tspan font-weight="700">measured=true:</tspan> model selection · real tokens · wall-clock latency · keyless auth</text>
  <rect x="500" y="432" width="281" height="30" rx="8" fill="#fdf3e3" stroke="#e6cfa0"/>
  <text x="514" y="451" font-size="10.5" fill="#8a5a12"><tspan font-weight="700">cost RATE = illustrative</tspan> (not Azure billing)</text>

  <text x="20" y="486" font-size="10" fill="#52606d">grok-4-1 was never deployed by us — this account holds only model-router + gpt-5.4 / -mini / -nano, proof the router owns its roster.</text>
</svg>
