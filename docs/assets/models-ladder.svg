<svg xmlns="http://www.w3.org/2000/svg" width="760" height="260" viewBox="0 0 760 260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="The model ladder: five candidate models ordered cheapest to priciest by dollars per resolved task">
  <rect x="0" y="0" width="760" height="260" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#1f2933">The model ladder</text>
  <text x="24" y="50" font-size="12.5" fill="#52606d">One ordered candidate list per task class — sorted by <tspan font-weight="700">$/resolved</tspan> (cheapest first). The router walks it left → right.</text>

  <!-- baseline -->
  <line x1="24" y1="196" x2="736" y2="196" stroke="#cbd2d9" stroke-width="1.5"/>

  <!-- chips: bottom-aligned, height grows with capability -->
  <!-- mini-fast -->
  <g>
    <rect x="34" y="152" width="120" height="44" rx="8" fill="#c8922b"/>
    <text x="94" y="179" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">mini-fast</text>
    <text x="94" y="216" font-size="12.5" font-weight="700" fill="#1f2933" text-anchor="middle">$0.12</text>
    <text x="94" y="232" font-size="10.5" fill="#7b8794" text-anchor="middle">pass ~0.74</text>
  </g>
  <!-- swift-coder -->
  <g>
    <rect x="176" y="142" width="120" height="54" rx="8" fill="#2e8b57"/>
    <text x="236" y="174" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">swift-coder</text>
    <text x="236" y="216" font-size="12.5" font-weight="700" fill="#1f2933" text-anchor="middle">$0.35</text>
    <text x="236" y="232" font-size="10.5" fill="#7b8794" text-anchor="middle">pass ~0.80</text>
  </g>
  <!-- balanced-pro -->
  <g>
    <rect x="318" y="130" width="120" height="66" rx="8" fill="#3b7dd8"/>
    <text x="378" y="168" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">balanced-pro</text>
    <text x="378" y="216" font-size="12.5" font-weight="700" fill="#1f2933" text-anchor="middle">$1.05</text>
    <text x="378" y="232" font-size="10.5" fill="#7b8794" text-anchor="middle">pass ~0.88</text>
  </g>
  <!-- deep-reasoner -->
  <g>
    <rect x="460" y="116" width="120" height="80" rx="8" fill="#7b52c9"/>
    <text x="520" y="161" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">deep-reasoner</text>
    <text x="520" y="216" font-size="12.5" font-weight="700" fill="#1f2933" text-anchor="middle">$2.80</text>
    <text x="520" y="232" font-size="10.5" fill="#7b8794" text-anchor="middle">pass ~0.88</text>
  </g>
  <!-- premium-max -->
  <g>
    <rect x="602" y="100" width="120" height="96" rx="8" fill="#c0392b"/>
    <text x="662" y="153" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">premium-max</text>
    <text x="662" y="216" font-size="12.5" font-weight="700" fill="#1f2933" text-anchor="middle">$5.20</text>
    <text x="662" y="232" font-size="10.5" fill="#7b8794" text-anchor="middle">pass ~0.82</text>
  </g>

  <!-- direction arrow -->
  <defs>
    <marker id="arrHead" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#9aa5b1"/>
    </marker>
  </defs>
  <line x1="34" y1="250" x2="722" y2="250" stroke="#9aa5b1" stroke-width="1.4" marker-end="url(#arrHead)"/>
  <text x="34" y="245" font-size="10.5" fill="#7b8794">cheaper</text>
  <text x="722" y="245" font-size="10.5" fill="#7b8794" text-anchor="end">pricier · more capable</text>
</svg>
