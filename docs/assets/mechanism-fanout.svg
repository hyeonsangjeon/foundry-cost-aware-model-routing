<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Ensemble fan-out: run every candidate in parallel, keep the cheapest passing result, and pay the ensemble tax for the losing calls">
  <rect x="0" y="0" width="760" height="320" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#1f2933">Ensemble fan-out — run every candidate, keep the best</text>
  <text x="24" y="50" font-size="12.5" fill="#52606d"><tspan font-weight="700">compare</tspan> mode: score all candidates by execution signals, keep the highest — ties break to the <tspan font-weight="700">cheapest passing</tspan> model.</text>

  <defs>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#b6a0dd"/></marker>
    <g id="x2"><circle r="10" fill="#fdecea"/><path d="M-3.6,-3.6 L3.6,3.6 M3.6,-3.6 L-3.6,3.6" stroke="#c0392b" stroke-width="2.2" stroke-linecap="round"/></g>
    <g id="ok2"><circle r="10" fill="#e6f4ec"/><path d="M-4,0 L-1,3 L4.5,-3.6" stroke="#2e8b57" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
  </defs>

  <!-- task -->
  <rect x="24" y="128" width="112" height="58" rx="8" fill="#f3effa" stroke="#c9b8ea"/>
  <text x="80" y="153" font-size="12.5" font-weight="700" fill="#1f2933" text-anchor="middle">high-value</text>
  <text x="80" y="171" font-size="10.5" fill="#7b6aa0" text-anchor="middle">task</text>

  <!-- fan-out arrows (draw-in simultaneously) -->
  <g fill="none" stroke="#b6a0dd" stroke-width="1.8" stroke-dasharray="240" marker-end="url(#ar2)">
    <path d="M138,150 C 220,150 240,86 300,86"><animate attributeName="stroke-dashoffset" dur="6s" repeatCount="indefinite" keyTimes="0;0.28;0.9;1" values="240;0;0;240"/></path>
    <path d="M138,155 C 220,155 240,140 300,140"><animate attributeName="stroke-dashoffset" dur="6s" repeatCount="indefinite" keyTimes="0;0.28;0.9;1" values="240;0;0;240"/></path>
    <path d="M138,160 C 220,160 240,194 300,194"><animate attributeName="stroke-dashoffset" dur="6s" repeatCount="indefinite" keyTimes="0;0.28;0.9;1" values="240;0;0;240"/></path>
    <path d="M138,165 C 220,165 240,248 300,248"><animate attributeName="stroke-dashoffset" dur="6s" repeatCount="indefinite" keyTimes="0;0.28;0.9;1" values="240;0;0;240"/></path>
  </g>

  <!-- candidates (all run) -->
  <!-- mini-fast fail -->
  <rect x="304" y="68" width="150" height="36" rx="7" fill="#c8922b"/>
  <text x="316" y="90" font-size="12" font-weight="700" fill="#ffffff">mini-fast</text>
  <text x="446" y="90" font-size="10.5" fill="#fff4e0" text-anchor="end">$0.12</text>
  <g transform="translate(474,86)"><use href="#x2"/><animate attributeName="opacity" dur="6s" repeatCount="indefinite" keyTimes="0;0.3;0.34;0.9;1" values="0;0;1;1;0"/></g>
  <!-- swift-coder pass = winner -->
  <rect x="304" y="122" width="150" height="36" rx="7" fill="#2e8b57"/>
  <text x="316" y="144" font-size="12" font-weight="700" fill="#ffffff">swift-coder</text>
  <text x="446" y="144" font-size="10.5" fill="#e6f4ec" text-anchor="end">$0.35</text>
  <g transform="translate(474,140)"><use href="#ok2"/><animate attributeName="opacity" dur="6s" repeatCount="indefinite" keyTimes="0;0.3;0.34;0.9;1" values="0;0;1;1;0"/></g>
  <!-- balanced pass -->
  <rect x="304" y="176" width="150" height="36" rx="7" fill="#3b7dd8"/>
  <text x="316" y="198" font-size="12" font-weight="700" fill="#ffffff">balanced-pro</text>
  <text x="446" y="198" font-size="10.5" fill="#e3ecfa" text-anchor="end">$1.05</text>
  <g transform="translate(474,194)"><use href="#ok2"/><animate attributeName="opacity" dur="6s" repeatCount="indefinite" keyTimes="0;0.3;0.34;0.9;1" values="0;0;1;1;0"/></g>
  <!-- deep pass -->
  <rect x="304" y="230" width="150" height="36" rx="7" fill="#7b52c9"/>
  <text x="316" y="252" font-size="12" font-weight="700" fill="#ffffff">deep-reasoner</text>
  <text x="446" y="252" font-size="10.5" fill="#efe9fa" text-anchor="end">$2.80</text>
  <g transform="translate(474,248)"><use href="#ok2"/><animate attributeName="opacity" dur="6s" repeatCount="indefinite" keyTimes="0;0.3;0.34;0.9;1" values="0;0;1;1;0"/></g>

  <!-- winner ring on swift-coder -->
  <rect x="299" y="117" width="200" height="46" rx="9" fill="none" stroke="#2e8b57" stroke-width="3" opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" keyTimes="0;0.42;0.46;0.9;1" values="0;0;1;1;0"/>
  </rect>
  <text x="512" y="144" font-size="11" font-weight="700" fill="#2e8b57" opacity="0">◄ keep (cheapest passing)
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" keyTimes="0;0.44;0.48;0.9;1" values="0;0;1;1;0"/></text>

  <!-- ensemble tax panel -->
  <g opacity="0">
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" keyTimes="0;0.55;0.6;0.9;1" values="0;0;1;1;0"/>
    <text x="512" y="196" font-size="12.5" font-weight="700" fill="#1f2933">The ensemble tax</text>
    <text x="512" y="214" font-size="10.5" fill="#7b8794">you pay the losers too</text>
    <!-- winner bar -->
    <rect x="512" y="224" width="40" height="14" rx="3" fill="#2e8b57"/>
    <text x="558" y="235" font-size="10" fill="#52606d">winners ≈ $0.13</text>
    <!-- fanout bar -->
    <rect x="512" y="246" width="0" height="14" rx="3" fill="#7b52c9">
      <animate attributeName="width" dur="6s" repeatCount="indefinite" keyTimes="0;0.6;0.72;0.9;1" values="0;0;154;154;0"/>
    </rect>
    <text x="512" y="278" font-size="11" font-weight="700" fill="#7b52c9">fan-out spend ≈ $0.50  ·  3.7× tax</text>
  </g>

  <text x="24" y="308" font-size="10.5" fill="#9aa5b1">used by · ensemble  (adaptive turns this dial OFF — see below)</text>
</svg>
