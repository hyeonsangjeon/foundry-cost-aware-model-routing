site_name: Foundry 비용 인지 모델 라우팅
site_description: 태스크마다 '통과하는 가장 싼 모델'로 라우팅하고, 오프라인으로 증명하는 실험 — 한국어 매뉴얼과 실험노트.
site_author: Hyeonsang Jeon
site_url: https://hyeonsangjeon.github.io/foundry-cost-aware-model-routing/
repo_url: https://github.com/hyeonsangjeon/foundry-cost-aware-model-routing
repo_name: foundry-cost-aware-model-routing
edit_uri: edit/main/docs/
copyright: >-
  모든 수치는 합성 데이터에 대한 오프라인 투영입니다 (labels.measured = false). 측정된 절감이 아닙니다.

theme:
  name: material
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: teal
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - 홈: index.md
  - 매뉴얼:
      - 30초 설치: manual/install.md
      - 핵심 개념: manual/concept.md
      - CLI 레퍼런스: manual/cli.md
      - 실험 설정(YAML): manual/experiments.md
      - 대시보드: manual/dashboard.md
      - "문제 하나, 네 가지 방법": manual/head-to-head.md
      - 메트릭 & Foundry: manual/metrics.md
      - 라이브 실측 브릿지: manual/foundry-live.md
      - 감사 원장: manual/ledger.md
  - 실험노트:
      - 소개와 방법론: lab-notebook/index.md
      - "스토리 아크 · 한눈에 보기": lab-notebook/story-arc.md
      - "실험 01 · 히어로": lab-notebook/01-hero.md
      - "실험 02 · 큐레이션 샘플": lab-notebook/02-curated.md
      - "실험 03 · 커버리지 절벽": lab-notebook/03-coverage-cliff.md
      - "실험 04 · 공짜 점심은 없다": lab-notebook/04-no-free-lunch.md
      - "실험 05 · 앙상블 팬아웃 세금": lab-notebook/05-ensemble-fanout.md
      - "실험 06 · 적응형 팬아웃 다이얼": lab-notebook/06-fanout-dial.md
      - "실험 07 · 라우팅 레이어": lab-notebook/07-model-router.md
      - "실험 08 · 아레나 (프로토타입 실행)": lab-notebook/08-arena.md
      - 개발 로그: lab-notebook/devlog.md
  - 정직함 규약: honesty.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hyeonsangjeon/foundry-cost-aware-model-routing
