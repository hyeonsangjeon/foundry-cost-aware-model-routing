# hero.yaml — the flagship "install and it just works" experiment.
#
# Route the whole synthetic workload (100 tasks) cost-aware and compare it to
# the naive arm (the most expensive candidate on every task). The `expect`
# block is a reproducibility contract: `cost-router hero` fails loudly if this
# offline projection ever drifts below the floor.
#
# Everything is offline and deterministic. Every number is a projection over
# synthetic data (labels.measured = false), not a measured saving.

name: hero
title: "같은 커버리지, 더 낮은 비용 — 30초 히어로 실행"
summary: >-
  합성 워크로드 100건을 '통과하는 가장 싼 모델 먼저, 실패할 때만 상위 모델로'
  라우팅해 모든 태스크에 프리미엄 모델을 쓰는 나이브 방식과 비교합니다.

dataset:
  workload: samples/telemetry/mixed-coding-workload.sample.jsonl
  signals: null        # null + synth:true → deterministic offline signals
  synth: true

policy: null           # null → bundled seed policy (src/policy/seed_policy.yaml)
pricing: null          # null → bundled illustrative pricing (measured=false)

# Highlight one task where cost-aware routing visibly beats the premium arm.
# "auto" picks the accepted task with the largest naive/routed cost ratio.
spotlight: auto

# Reproducibility floor (offline projection over synthetic data).
expect:
  min_coverage: 1.0    # routing must keep full coverage
  min_delta_pct: 0.20  # …while cutting at least 20% of the naive bill
  min_tasks: 100
