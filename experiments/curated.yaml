# curated.yaml — the fast, human-readable sample.
#
# A tiny curated fixture (a handful of tasks with hand-written offline signals)
# that runs instantly and shows the naive-vs-routed gap on data you can read
# end to end. Use this as the smallest possible "does it work?" check.

name: curated
title: "큐레이션 샘플 — 눈으로 따라가는 5개 태스크"
summary: >-
  손으로 작성한 오프라인 신호가 붙은 소수의 태스크를 라우팅해, 데이터를
  처음부터 끝까지 읽으며 라우팅 결정을 눈으로 확인할 수 있는 최소 샘플입니다.

dataset:
  workload: samples/telemetry/mixed-coding-workload.sample.jsonl
  signals: samples/responses/routing-signals.sample.json
  synth: false

policy: null
pricing: null

spotlight: auto

expect:
  min_coverage: 1.0
  min_delta_pct: 0.30
  min_tasks: 3
