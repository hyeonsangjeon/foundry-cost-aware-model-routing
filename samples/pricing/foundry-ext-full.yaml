# Azure AI Foundry — FULL multi-provider fleet: per-1M-token rates (USD).
#
# BASIS: ILLUSTRATIVE list-style rates for the models deployed on
#   `aoai-foundry-iq-demo-ext` (Azure OpenAI + partner/OSS on one Foundry
#   resource). The OpenAI-family rows track public Azure AI Foundry global-
#   standard list prices; the partner rows are round-number placeholders so the
#   arena math is transparent — they are NOT quotes. Drop in your negotiated
#   rates for real accounting.
#
# HONESTY: `cost-router foundry arena --live` prices REAL token usage from REAL
#   calls (labels.measured = true, spend_source = provider-usage). The dollar
#   figure is that real usage x THESE rates. Copy this file and pass --pricing
#   (or set FOUNDRY_PRICING_PATH) to substitute your own. Model names are
#   normalized (a trailing -YYYY-MM-DD suffix is stripped) before lookup.
#
# Reasoning tokens bill at the output rate. Cached input reflects Azure prompt
# caching (~10% of input for the GPT-5 family).
#
# unit: USD per 1,000,000 tokens, by token kind.

version: 1
currency: USD
unit: per_1m_tokens

models:
  # --- Azure OpenAI family ---
  gpt-5.6-sol:              { input: 1.25, cached: 0.125, output: 10.00, reasoning: 10.00 }
  gpt-4o:                   { input: 2.50, cached: 1.25,  output: 10.00, reasoning: 10.00 }
  gpt-5.4-mini:             { input: 0.25, cached: 0.025, output: 2.00,  reasoning: 2.00 }
  gpt-5.4-nano:             { input: 0.05, cached: 0.005, output: 0.40,  reasoning: 0.40 }

  # The router deployment itself never bills directly (it delegates), but keep a
  # row so an unresolved id is never silently cheap.
  model-router:             { input: 1.25, cached: 0.125, output: 10.00, reasoning: 10.00 }

  # --- Partner / OSS (Azure AI Model Inference) — ILLUSTRATIVE placeholders ---
  deepseek-v4-pro:          { input: 0.30, cached: 0.03,  output: 1.20,  reasoning: 1.20 }
  mistral-large-3:          { input: 2.00, cached: 0.20,  output: 6.00,  reasoning: 6.00 }
  grok-4-1-fast-reasoning:  { input: 0.20, cached: 0.05,  output: 0.50,  reasoning: 0.50 }
  kimi-k2-6:                { input: 0.60, cached: 0.06,  output: 2.50,  reasoning: 2.50 }
  llama-4-maverick:         { input: 0.35, cached: 0.035, output: 1.40,  reasoning: 1.40 }
  cohere-command-a-plus:    { input: 2.50, cached: 0.25,  output: 10.00, reasoning: 10.00 }
  phi-4-reasoning:          { input: 0.15, cached: 0.015, output: 0.60,  reasoning: 0.60 }

# Any model not listed prices at the frontier rate so unknowns are never underpriced.
default: { input: 1.25, cached: 0.125, output: 10.00, reasoning: 10.00 }
