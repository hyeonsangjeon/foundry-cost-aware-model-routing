name: docs

# Build the Korean MkDocs Material site and publish it to GitHub Pages.
# Enable once in repo settings: Settings → Pages → Build and deployment →
# Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/build_static_site.py"
      - "src/**"
      - "samples/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt
          pip install -e .

      - name: Build (strict)
        run: mkdocs build --strict --site-dir _site

      - name: Build interactive dashboard demo
        run: python scripts/build_static_site.py _site/demo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
