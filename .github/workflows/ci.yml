name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Validation gate (incl. redaction scan)
        run: bash scripts/validate-local.sh

      - name: Tests
        run: |
          set +e
          pytest
          rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "pytest: no tests collected"
            rc=0
          fi
          exit $rc

      - name: Sample replay (if present)
        run: |
          if [ -f samples/python/replay_route.py ]; then
            python samples/python/replay_route.py samples/telemetry/mixed-coding-workload.sample.jsonl
            python samples/python/replay_route.py samples/telemetry/mixed-coding-workload.sample.jsonl --synth
          else
            echo "sample replay not present"
          fi

      - name: CLI smoke (cost-router)
        run: |
          if command -v cost-router >/dev/null 2>&1; then
            cost-router --version
            cost-router replay --synth
            cost-router evals --synth
            cost-router serve --help
          else
            echo "cost-router console script not installed"
          fi

      - name: Policy ops smoke
        run: |
          if command -v cost-router >/dev/null 2>&1; then
            cost-router policy --help
            cost-router policy validate --policy src/policy/seed_policy.yaml
            cost-router policy validate --policy samples/policy/candidate.example.yaml
            cost-router policy simulate --policy samples/policy/candidate.example.yaml --synth
            cost-router policy regression --candidate samples/policy/candidate.example.yaml --synth
            cost-router replay --policy samples/policy/candidate.example.yaml --synth
          else
            echo "cost-router console script not installed"
          fi

      - name: Experiment reproducibility contract
        run: |
          if command -v cost-router >/dev/null 2>&1; then
            cost-router experiment list
            cost-router experiment run curated
            cost-router experiment run ensemble
            cost-router experiment run limits
            cost-router hero
          else
            echo "cost-router console script not installed"
          fi

      - name: Service smoke (offline endpoints)
        run: |
          python - <<'PY'
          import json
          from router.server import RouterService

          svc = RouterService()
          assert svc.dispatch("GET", "/healthz").status == 200
          assert svc.dispatch("GET", "/policy").status == 200
          task = {"task_id": "t-0001", "class": "generate",
                  "tokens": {"input": 1232, "cached": 448, "output": 418, "reasoning": 168}}
          resp = svc.dispatch("POST", "/route", json.dumps({"task": task, "synth": True}).encode())
          assert resp.status == 200 and resp.payload["trace"]["chosen"], resp.payload
          print("service smoke ok:", resp.payload["trace"]["chosen"])
          PY

      - name: Docker build (optional)
        run: |
          if command -v docker >/dev/null 2>&1; then
            docker build -t cost-router:ci .
          else
            echo "docker not available on runner; skipping image build"
          fi

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install docs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Build docs (strict)
        run: mkdocs build --strict

