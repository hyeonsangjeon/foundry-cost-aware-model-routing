name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Validation gate (incl. redaction scan)
        run: bash scripts/validate-local.sh

      - name: Tests
        run: |
          set +e
          pytest
          rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "pytest: no tests collected"
            rc=0
          fi
          exit $rc

      - name: Sample replay (if present)
        run: |
          if [ -f samples/python/replay_route.py ]; then
            python samples/python/replay_route.py samples/telemetry/mixed-coding-workload.sample.jsonl
          else
            echo "sample replay not present"
          fi
